<!doctype html><html lang="en"><head><meta charset="utf-8"><title>TikTok OAuth Callback</title><style>body{font-family:system-ui,sans-serif;max-width:760px;margin:60px auto;padding:0 20px;line-height:1.6;color:#222}h1{font-size:26px}code{display:block;padding:14px 16px;background:#f4f4f6;border:1px solid #e0e0e6;border-radius:6px;font-family:ui-monospace,monospace;font-size:13px;word-break:break-all;margin:8px 0}.box{margin-top:24px}.muted{color:#666;font-size:14px}</style></head><body><h1>TikTok OAuth Callback</h1><p class="muted">Sleeping Goddesses Saga app authorization landing page. Copy the authorization code below into your content factory environment.</p>p><div class="box"><strong>Authorization code:</strong><code id="code">(none)</code>code></div>div><div class="box"><strong>State:</strong><code id="state">(none)</code>code></div>div><div class="box"><strong>Scopes granted:</strong><code id="scopes">(none)</code>code></div>div><div class="box"><strong>Error (if any):</strong><code id="error">(none)</code>code></div>div><script>const q=new URLSearchParams(location.search);['code','state','scopes','error'].forEach(k=>{const el=document.getElementById(k);if(el){const v=q.get(k);if(v)el.innerText=v;}});const ed=q.get('error_description');if(ed){const el=document.getElementById('error');if(el)el.innerText=(el.innerText==='(none)'?'':el.innerText+' — ')+ed;}</script></body></html>html></script></strong></strong></h1></body></style></title></head>
